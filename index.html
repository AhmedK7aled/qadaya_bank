<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="بنك أسئلة القضايا المجتمعية - تدرب وراجع واختبر نفسك">
    <title>بنك أسئلة القضايا المجتمعية</title>
    <link rel="icon" type="image/svg+xml" href="logo/variations/logo-tab.svg">
    <link rel="stylesheet" href="styles.css">
    <script defer src="https://cloud.umami.is/script.js" data-website-id="34e213bb-a8d7-4c66-973a-3e7698b18c38"></script>
</head>
<body>

<div class="app-layout">
    <!-- Overlay for mobile -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="logo/variations/logo-sidebar.svg" alt="بنك القضايا المجتمعية" class="logo-sidebar">
            <button id="btn-close-sidebar" class="btn-icon btn-close-mobile" title="إغلاق القائمة" aria-label="إغلاق القائمة">✕</button>
        </div>
        
        <div class="sidebar-content">
            <!-- Navigation -->
            <div class="nav-menu">
                <button id="nav-questions" class="nav-btn active">📚 بنك الأسئلة</button>
                <button id="nav-progress" class="nav-btn" style="padding-bottom: 10px; display: flex; flex-direction: column;">
                    <div style="display: flex; justify-content: space-between; width: 100%; margin-bottom: 8px;">
                        <span>📊 التقدم والإحصائيات</span>
                        <span id="sidebar-overview-percent" style="font-size: 0.85rem; color: var(--text-muted);">0%</span>
                    </div>
                    <div class="progress-bar-container stacked" style="height: 4px; margin-top: 0; background: var(--border-color);">
                        <div class="progress-bar correct-bar" id="sidebar-overview-correct"></div>
                        <div class="progress-bar wrong-bar" id="sidebar-overview-wrong"></div>
                    </div>
                </button>
            </div>

            <!-- Filters -->
            <div class="controls">
                <h3 class="section-title">🔍 الفلاتر</h3>
                <div class="control-group">
                    <label for="filter-subject">📌 الموضوع</label>
                    <select id="filter-subject">
                        <option value="all">الكل</option>
                        <option value="السكان في مصر">السكان في مصر</option>
                        <option value="حقوق الإنسان">حقوق الإنسان</option>
                        <option value="الشفافية ومكافحة الفساد">الشفافية ومكافحة الفساد</option>
                        <option value="التسامح الديني">التسامح الديني</option>
                        <option value="التلوث البيئي">التلوث البيئي</option>
                        <option value="الكوارث الطبيعية">الكوارث الطبيعية</option>
                        <option value="التربية الإعلامية الرقمية">التربية الإعلامية الرقمية</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="filter-type">📝 النوع</label>
                    <select id="filter-type">
                        <option value="all">الكل</option>
                        <option value="صح/خطأ">صح / خطأ</option>
                        <option value="اختيار من متعدد">اختيار من متعدد</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="filter-status">📋 الحالة</label>
                    <select id="filter-status">
                        <option value="all">الكل</option>
                        <option value="unanswered">لم تتم الإجابة</option>
                        <option value="correct">صحيحة</option>
                        <option value="wrong">خاطئة (مراجعة الأخطاء)</option>
                        <option value="bookmarked">محفوظة 🔖</option>
                    </select>
                </div>
            </div>

            <!-- Print Controls -->
            <div class="print-controls">
                <h3 class="section-title">🖨️ الطباعة</h3>
                <div class="print-options" style="margin-bottom: 12px; display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox" id="print-no-answers" style="width: 16px; height: 16px; accent-color: var(--primary);">
                    <label for="print-no-answers" style="font-size: 0.9rem; font-weight: 500; cursor: pointer;">طباعة بدون إجابات (نسخة الطالب)</label>
                </div>
                <div class="print-buttons">
                    <button id="btn-print-all">🖨️ طباعة جميع الأسئلة</button>
                    <button id="btn-print-bookmarked">🔖 طباعة المحفوظات</button>
                    <div class="print-subject-wrapper">
                        <label for="print-subject-select">حسب الموضوع:</label>
                        <select id="print-subject-select">
                            <option value="">— اختر موضوعاً —</option>
                            <option value="السكان في مصر">السكان في مصر</option>
                            <option value="حقوق الإنسان">حقوق الإنسان</option>
                            <option value="الشفافية ومكافحة الفساد">الشفافية ومكافحة الفساد</option>
                            <option value="التسامح الديني">التسامح الديني</option>
                            <option value="التلوث البيئي">التلوث البيئي</option>
                            <option value="الكوارث الطبيعية">الكوارث الطبيعية</option>
                            <option value="التربية الإعلامية الرقمية">التربية الإعلامية الرقمية</option>
                        </select>
                        <button id="btn-print-subject">🖨️ طباعة</button>
                    </div>
                </div>
            </div>

            <!-- Data Controls -->
            <div class="data-controls">
                <h3 class="section-title">⚙️ إدارة البيانات</h3>
                <div class="data-buttons">
                    <button id="btn-export">📥 تصدير تقدمي</button>
                    <button id="btn-import-trigger">📤 استيراد التقدم</button>
                    <button id="btn-reset" class="btn-danger">🗑️ إعادة تعيين</button>
                </div>
                <input type="file" id="import-file" accept=".json" style="display:none">
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="main-header">
            <div class="header-right">
                <button id="btn-toggle-sidebar" class="btn-icon btn-hamburger" title="القائمة" aria-label="القائمة">☰</button>
                <div class="header-titles">
                    <h1>بنك أسئلة القضايا المجتمعية</h1>
                    <p>لا تنسوني من صالح دعائكم 💙</p>
                </div>
            </div>
            <div class="header-left" style="display: flex; gap: 10px;">
                <button id="btn-focus-mode" class="btn-icon desktop-only" title="وضع التركيز وملء الشاشة" aria-label="وضع التركيز وملء الشاشة">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
                </button>
                <button id="btn-dark-mode" class="btn-icon" title="تبديل الوضع الليلي" aria-label="تبديل الوضع الليلي">🌙</button>
            </div>
        </header>

        <div id="questions-view" class="view-section active">
        <div class="dashboard">
            <div class="stat-card">
                <h3>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
                    إجمالي الأسئلة
                </h3>
                <div class="value" id="stat-total">0</div>
            </div>
            <div class="stat-card">
                <h3>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                    صحيحة
                </h3>
                <div class="value correct-color" id="stat-correct">0</div>
            </div>
            <div class="stat-card">
                <h3>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
                    خاطئة
                </h3>
                <div class="value wrong-color" id="stat-wrong">0</div>
            </div>
            <div class="stat-card">
                <h3>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#EAB308" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>
                    محفوظات
                </h3>
                <div class="value" id="stat-bookmarked">0</div>
            </div>
            <div class="stat-card">
                <h3>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                    الإنجاز
                </h3>
                <div class="value" id="stat-percent">0%</div>
                <div class="progress-bar-container stacked">
                    <div class="progress-bar correct-bar" id="progress-bar-correct"></div>
                    <div class="progress-bar wrong-bar" id="progress-bar-wrong"></div>
                </div>
            </div>
        </div>

        <div class="search-bar">
            <span class="search-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </span>
            <input type="text" id="search-input" placeholder="ابحث في الأسئلة (مثال: البيئة، الفساد)..." autocomplete="off">
            <button id="search-clear" class="search-clear" title="مسح البحث">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>

        <div class="list-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px;">
            <div class="question-count" id="question-count" style="margin-bottom: 0;"></div>
            <div class="header-actions" style="display: flex; gap: 8px;">
                <button id="btn-retry-mode" class="btn-retry-mode">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                    إعادة الإجابة
                </button>
                <button id="btn-smart-review" class="btn-smart-review">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                    مراجعة الأخطاء
                </button>
            </div>
        </div>
        <div class="question-list" id="question-list"></div>
        <div class="pagination" id="pagination"></div>
        </div>

        <div id="progress-view" class="view-section" style="display: none;">
            <div class="kpi-cards-container" id="kpi-container">
                <div class="kpi-card">
                    <div class="kpi-icon" style="background: rgba(59, 130, 246, 0.1); color: #3b82f6;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"></path></svg>
                    </div>
                    <div class="kpi-info">
                        <p>إجمالي الأسئلة</p>
                        <h4 id="kpi-total">0</h4>
                    </div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon" style="background: rgba(16, 185, 129, 0.1); color: #10b981;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    </div>
                    <div class="kpi-info">
                        <p>إجابات صحيحة</p>
                        <h4 id="kpi-correct" style="color: #10b981;">0</h4>
                    </div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon" style="background: rgba(239, 68, 68, 0.1); color: #ef4444;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </div>
                    <div class="kpi-info">
                        <p>إجابات خاطئة</p>
                        <h4 id="kpi-wrong" style="color: #ef4444;">0</h4>
                    </div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon" style="background: rgba(245, 158, 11, 0.1); color: #f59e0b;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg>
                    </div>
                    <div class="kpi-info">
                        <p>نسبة الإنجاز</p>
                        <h4 id="kpi-percent" style="color: #f59e0b;">0%</h4>
                    </div>
                </div>
            </div>

            <div class="dual-charts-container">
                <div class="stat-card">
                    <h3>التوزيع العام</h3>
                    <div id="main-progress-chart"></div>
                </div>
                <div class="stat-card">
                    <h3>مقارنة دقة المواضيع</h3>
                    <div style="position: relative; height: 250px; width: 100%;"><canvas id="chart-subjects-bar"></canvas></div>
                </div>
            </div>

            <h3 class="section-title">تفاصيل المواضيع</h3>
            <div id="progress-grid" class="progress-grid"></div>
        </div>
    </main>
</div>

    <div id="toast" class="toast"></div>

    <!-- Back to top -->
    <button id="btn-back-to-top" class="btn-back-to-top" aria-label="العودة للأعلى">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>
    </button>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="data/tf1_data.js"></script>
<script src="data/tf2_data.js"></script>
<script src="data/tf3_data.js"></script>
<script src="data/tf4_data.js"></script>
<script src="data/mcq5_data.js"></script>
<script src="data/q6_data.js"></script>
<script src="data/tf7_data.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="data/db.js"></script>
<script src="app.js"></script>
</body>
</html>
