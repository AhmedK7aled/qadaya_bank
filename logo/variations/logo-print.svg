<svg id="logo-print" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200" width="100%" height="100%">
<style> 
  .bg-color { fill: #3B82F6; }
  .icon-fg { fill: #FFFFFF; }
  .icon-stroke { stroke: #3B82F6; }
  .text-color { fill: #1E293B; }
  
  /* Print Optimization: Support colors but enforce exact printing and monochrome fallbacks */
  @media print {
    * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }
  }
  @media print and (monochrome) {
    .bg-color { fill: #000000 !important; }
    .icon-stroke { stroke: #000000 !important; }
    .text-color { fill: #000000 !important; }
  }
</style>
<!-- Text -->
<text x="460" y="125" font-family="'Cairo', system-ui, sans-serif" font-size="85" font-weight="900" text-anchor="end" class="text-color">قضايا مجتمعية</text>
<!-- Icon -->
<defs><clipPath id="icon-clip"><rect x="500" y="0" width="200" height="200" rx="28"></rect></clipPath></defs>
<rect x="500" y="0" width="200" height="200" rx="28" class="bg-color"></rect>
<g clip-path="url(#icon-clip)">
  <g class="icon-fg icon-stroke" stroke-width="4.5" stroke-linejoin="round" stroke-linecap="round" paint-order="stroke fill" transform="translate(480, -40) scale(1.2)">
    <path d="M 18 200 V 196 A 18 18 0 0 1 54 196 V 200 Z"></path><circle cx="36" cy="164" r="11"></circle>
    <path d="M 146 200 V 196 A 18 18 0 0 1 182 196 V 200 Z"></path><circle cx="164" cy="164" r="11"></circle>
    <path d="M 42 200 V 186 A 22 22 0 0 1 86 186 V 200 Z"></path><circle cx="64" cy="146" r="14"></circle>
    <path d="M 114 200 V 186 A 22 22 0 0 1 158 186 V 200 Z"></path><circle cx="136" cy="146" r="14"></circle>
    <path d="M 68 200 V 178 A 32 32 0 0 1 132 178 V 200 Z"></path><circle cx="100" cy="118" r="19"></circle>
  </g>
</g>
</svg>
